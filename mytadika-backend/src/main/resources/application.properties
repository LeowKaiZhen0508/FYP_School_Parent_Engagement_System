spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres
spring.datasource.username=YOUR_SUPABASE_DB_USERNAME
spring.datasource.password=YOUR_SUPABASE_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
# Supabase's pooled connection (session mode) caps concurrent clients at 15 — keep our footprint
# small and recycle connections aggressively so restarts during dev don't exhaust the pool.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.connection-timeout=10000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Gmail SMTP — replace with your Gmail address and App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Base URL used in reset email link
app.base-url=http://localhost:8080

# Supabase Storage — create a public bucket called "profile-images" in Supabase Dashboard > Storage
# Then paste your service role key from Supabase Dashboard > Settings > API
supabase.url=https://YOUR_PROJECT_REF.supabase.co
supabase.service-role-key=YOUR_SUPABASE_SERVICE_ROLE_KEY
supabase.storage.bucket=profile-images

# Multipart file upload (bumped for Memory Box video uploads — several photos or one short video per post)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Stripe (TEST MODE) — sign up free at stripe.com, Developers > API keys, and paste your
# test keys below. The webhook secret comes from Developers > Webhooks after adding an
# endpoint (only needed if you wire up real webhooks; the checkout-session confirm flow
# used by parentfees.html works without it).
stripe.secret-key=YOUR_STRIPE_TEST_SECRET_KEY
stripe.publishable-key=YOUR_STRIPE_TEST_PUBLISHABLE_KEY
stripe.webhook-secret=YOUR_STRIPE_WEBHOOK_SECRET

# ToyyibPay (SANDBOX) — second payment gateway option. Sign up free at https://dev.toyyibpay.com,
# get your User Secret Key from Settings > Profile, and create a Category (dashboard > Category >
# Create New Category) to get a Category Code. Paste both below.
toyyibpay.base-url=https://dev.toyyibpay.com
toyyibpay.user-secret-key=YOUR_TOYYIBPAY_SECRET_KEY
toyyibpay.category-code=YOUR_TOYYIBPAY_CATEGORY_CODE