<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTadika – Admin Profile</title>
    <script>
        if (!sessionStorage.getItem('token') && !localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="/components/sidebar-loader.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #fcf6e3; }
    </style>
</head>
<body class="text-stone-800 min-h-screen">

<main class="ml-64 pt-20 px-8 pb-12 min-h-screen">
    <div class="max-w-2xl mx-auto">

        <div class="mb-8">
            <h1 class="text-3xl font-black text-[#6c5a00]" style="font-family:'Plus Jakarta Sans',sans-serif">My Profile</h1>
            <p class="text-stone-500 text-sm mt-1">Your admin account details.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-stone-100 p-8 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
            <div class="relative">
                <div class="w-28 h-28 rounded-full border-4 border-[#ffd709]/30 overflow-hidden bg-[#ffd709]/20 flex items-center justify-center">
                    <img id="profile-avatar" alt="Profile" class="w-full h-full object-cover hidden">
                    <span id="profile-avatar-icon" class="material-symbols-outlined text-[#6c5a00] text-6xl" style="font-variation-settings:'FILL' 1">admin_panel_settings</span>
                </div>
                <a href="admineditprofile.html"
                    class="absolute bottom-0 right-0 bg-[#ffd709] text-[#6c5a00] w-9 h-9 rounded-full flex items-center justify-center shadow-lg border-4 border-white">
                    <span class="material-symbols-outlined text-sm">edit</span>
                </a>
            </div>
            <div class="flex-1 text-center md:text-left">
                <h2 id="profile-name" class="text-2xl font-black text-[#312f23]" style="font-family:'Plus Jakarta Sans',sans-serif">–</h2>
                <span class="inline-flex items-center gap-1 mt-1 px-3 py-1 rounded-full text-xs font-bold bg-[#ffd709]/30 text-[#6c5a00]">
                    <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1">admin_panel_settings</span>
                    Admin
                </span>
                <div class="mt-4 space-y-2">
                    <div class="flex items-center gap-2 justify-center md:justify-start text-sm text-stone-600">
                        <span class="material-symbols-outlined text-base text-stone-400">mail</span>
                        <span id="profile-email">–</span>
                    </div>
                    <div class="flex items-center gap-2 justify-center md:justify-start text-sm text-stone-600">
                        <span class="material-symbols-outlined text-base text-stone-400">call</span>
                        <span id="profile-phone">–</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6 flex items-center gap-3">
            <a href="admineditprofile.html"
                class="inline-flex items-center gap-2 px-5 py-2.5 bg-[#ffd709] text-[#6c5a00] font-bold rounded-full hover:bg-[#f5cc00] transition-colors text-sm">
                <span class="material-symbols-outlined text-lg">edit</span>
                Edit Profile
            </a>
            <button onclick="logout()"
                class="inline-flex items-center gap-2 px-5 py-2.5 bg-white border border-red-200 text-red-600 font-bold rounded-full hover:bg-red-50 transition-colors text-sm">
                <span class="material-symbols-outlined text-lg">logout</span>
                Logout
            </button>
        </div>

    </div>
</main>

<script>
(async () => {
    const accountId = localStorage.getItem('accountId') || sessionStorage.getItem('accountId');
    if (!accountId) return;
    try {
        const res = await fetch(`/api/profile/${accountId}`);
        if (!res.ok) return;
        const p = await res.json();
        document.getElementById('profile-name').textContent = p.fullName || 'Admin';
        document.getElementById('profile-email').textContent = p.email || 'Not provided';
        document.getElementById('profile-phone').textContent = p.phoneNumber || 'Not set';
        if (p.profileImageUrl) {
            document.getElementById('profile-avatar').src = p.profileImageUrl;
            document.getElementById('profile-avatar').classList.remove('hidden');
            document.getElementById('profile-avatar-icon').classList.add('hidden');
        }
    } catch (e) {}
})();
</script>

<script>loadSidebar('admin', 'profile'); loadTopbar('admin');</script>
</body>
</html>
