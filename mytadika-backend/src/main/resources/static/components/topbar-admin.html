<header id="app-topbar" class="fixed top-0 left-64 right-0 z-30 flex justify-between items-center h-16 px-6 bg-[#fcf6e3] shadow-[0_2px_8px_-2px_rgba(49,47,35,0.10)]">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <div class="flex-1 flex flex-col justify-center gap-0.5 max-w-sm" id="topbar-greeting"></div>
    <div class="flex items-center gap-3">
        <div class="relative" id="notif-wrapper">
            <button id="notif-btn" class="relative p-2 text-stone-600 hover:bg-[#ffd709]/10 rounded-full transition-colors" title="View all notifications">
                <span class="material-symbols-outlined">notifications</span>
                <span id="notif-badge" class="hidden absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1 leading-none pointer-events-none">0</span>
            </button>
        </div>
        <a href="/admin/adminprofile.html" class="flex items-center gap-3 pl-4 border-l border-stone-200 hover:opacity-75 transition-opacity">
            <div class="w-9 h-9 rounded-full bg-[#ffd709]/30 flex items-center justify-center overflow-hidden">
                <img id="topbar-avatar-img" class="w-full h-full object-cover hidden" alt="Profile">
                <span id="topbar-avatar-icon" class="material-symbols-outlined text-[#6c5a00]" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">account_circle</span>
            </div>
            <div class="flex flex-col items-start leading-none gap-0.5">
                <span class="text-sm font-bold text-[#312f23]" id="topbar-user-name">Admin</span>
                <span class="text-[10px] font-bold text-[#eeab00] uppercase tracking-wide" id="topbar-user-role">ADMIN</span>
            </div>
        </a>
    </div>
</header>
