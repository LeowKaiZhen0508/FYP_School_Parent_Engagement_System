<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Fees – MyTadika</title>
    <script>
        if (!sessionStorage.getItem('token') && !localStorage.getItem('token')) {
            window.location.replace('/login.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { headline: ['Plus Jakarta Sans', 'sans-serif'], body: ['Be Vietnam Pro', 'sans-serif'] }
            }}
        };
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
    <script src="/components/sidebar-loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-[#fcf6e3] text-[#312f23] min-h-screen">

<main class="ml-64 pt-20 p-8 min-h-screen">
    <div class="max-w-4xl mx-auto">

        <!-- Page header -->
        <div class="mb-4">
            <h1 class="text-3xl font-black tracking-tight text-[#6c5a00] font-headline">Fees</h1>
            <p class="text-stone-500 text-sm mt-1">Tuition fee status &amp; payment history</p>
        </div>

        <!-- Child switcher -->
        <div id="child-switcher" class="hidden flex gap-2 mb-4 flex-wrap"></div>

        <div id="page-loading" class="py-24 flex justify-center">
            <span class="material-symbols-outlined text-4xl text-stone-300 spin">progress_activity</span>
        </div>

        <div id="empty-state" class="hidden bg-white rounded-2xl shadow-sm border border-stone-100 p-12 text-center text-stone-400">
            <span class="material-symbols-outlined text-5xl opacity-30">payments</span>
            <p class="mt-3 text-sm">No children linked yet.</p>
        </div>

        <div id="fees-wrap" class="hidden">
            <!-- Pending status banner -->
            <div id="status-banner" class="rounded-2xl shadow-sm p-6 mb-6 flex items-center gap-4"></div>

            <!-- History -->
            <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-stone-100">
                    <h3 class="text-sm font-bold text-[#312f23] font-headline">Payment History</h3>
                </div>
                <div id="history-empty" class="hidden py-12 text-center text-stone-400 text-sm">No fee records yet.</div>
                <div id="history-list" class="divide-y divide-stone-50"></div>
            </div>
        </div>

    </div>
</main>

<!-- Choose Payment Gateway Modal -->
<div id="gateway-modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
        <h2 class="text-lg font-black text-[#312f23] mb-1 font-headline">Choose Payment Method</h2>
        <p class="text-sm text-stone-500 mb-5"><span id="gw-description"></span> — <span class="font-bold text-[#6c5a00]" id="gw-amount"></span></p>
        <div class="space-y-3">
            <button onclick="payWithGateway('stripe')" class="w-full flex items-center gap-3 p-4 rounded-xl border border-stone-200 hover:border-[#ffd709] hover:bg-[#ffd709]/5 transition-colors text-left">
                <span class="material-symbols-outlined text-2xl text-[#6c5a00]">credit_card</span>
                <div><p class="font-bold text-sm text-[#312f23]">Card (Stripe)</p><p class="text-xs text-stone-400">Pay by credit/debit card</p></div>
            </button>
            <button onclick="payWithGateway('toyyibpay')" class="w-full flex items-center gap-3 p-4 rounded-xl border border-stone-200 hover:border-[#ffd709] hover:bg-[#ffd709]/5 transition-colors text-left">
                <span class="material-symbols-outlined text-2xl text-[#6c5a00]">account_balance</span>
                <div><p class="font-bold text-sm text-[#312f23]">FPX / Card (ToyyibPay)</p><p class="text-xs text-stone-400">Pay by online banking or card</p></div>
            </button>
        </div>
        <button onclick="closeGatewayModal()" class="w-full mt-4 py-2.5 rounded-xl border border-stone-200 text-sm font-semibold text-stone-600 hover:bg-stone-50">Cancel</button>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-stone-800 text-white text-xs px-5 py-2.5 rounded-full shadow-lg z-50"></div>

<script>
    let myAccountId = localStorage.getItem('accountId') || sessionStorage.getItem('accountId');
    let children = [];
    let selectedStudentId = null;
    let fees = [];
    let pendingCounts = {};

    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtMoney(n) { return Number(n||0).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtDate(d) { if (!d) return '—'; const [y,m,day] = d.split('-'); const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`; }
    function isOverdue(fee) { return fee.status === 'PENDING' && fee.dueDate && fee.dueDate < new Date().toISOString().slice(0,10); }
    function totalOf(f) { return f.totalAmount != null ? f.totalAmount : f.amount; }
    function paymentMethodLabel(pm) {
        return { STRIPE: 'Card (Stripe)', TOYYIBPAY: 'FPX/Card (ToyyibPay)', MANUAL: 'Manual/Cash' }[pm] || null;
    }

    function downloadReceipt(feeId) {
        const fee = fees.find(f => f.id === feeId);
        if (!fee) return;
        const child = children.find(c => c.id === selectedStudentId);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'pt', format: 'a4' });

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(108, 90, 0);
        doc.text('MyTadika', 40, 55);
        doc.setFontSize(12);
        doc.setTextColor(120, 113, 108);
        doc.text('Payment Receipt', 40, 75);

        doc.setDrawColor(230, 226, 210);
        doc.line(40, 90, 555, 90);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(90, 90, 90);
        let y = 120;
        const row = (label, value) => {
            doc.setFont('helvetica', 'bold');
            doc.text(label, 40, y);
            doc.setFont('helvetica', 'normal');
            doc.text(String(value), 200, y);
            y += 24;
        };

        row('Receipt No.', 'MTD-' + String(fee.id).padStart(6, '0'));
        row('Student', child ? child.fullName : '-');
        row('Description', fee.description);
        row('Amount', 'RM ' + fmtMoney(fee.amount));
        if (fee.lateFeeAmount) row('Late Fee', 'RM ' + fmtMoney(fee.lateFeeAmount));
        row('Total Paid', 'RM ' + fmtMoney(totalOf(fee)));
        row('Payment Method', paymentMethodLabel(fee.paymentMethod) || 'Manual/Cash');
        row('Date Paid', fee.paidAt ? fee.paidAt.slice(0,10) : '-');
        row('Status', 'PAID');

        doc.setDrawColor(230, 226, 210);
        doc.line(40, y + 10, 555, y + 10);
        doc.setFontSize(9);
        doc.setTextColor(150, 145, 130);
        doc.text('This is a system-generated receipt from MyTadika. Thank you for your payment.', 40, y + 35);

        doc.save(`MyTadika-Receipt-${fee.id}.pdf`);
    }

    async function loadChildren() {
        try {
            const res = await fetch(`/api/student/by-parent/${myAccountId}`);
            children = res.ok ? await res.json() : [];
        } catch (e) { children = []; }

        document.getElementById('page-loading').classList.add('hidden');
        if (!children.length) {
            document.getElementById('empty-state').classList.remove('hidden');
            return;
        }

        await loadPendingCounts();
        renderChildSwitcher();
        const requestedId = Number(new URLSearchParams(location.search).get('studentId'));
        const preselect = children.find(c => c.id === requestedId);
        selectChild(preselect ? preselect.id : children[0].id);
    }

    async function loadPendingCounts() {
        try {
            const res = await fetch(`/api/fees/pending-counts/${myAccountId}`);
            pendingCounts = res.ok ? await res.json() : {};
        } catch (e) { pendingCounts = {}; }
    }

    function renderChildSwitcher() {
        const wrap = document.getElementById('child-switcher');
        if (children.length <= 1) { wrap.classList.add('hidden'); return; }
        wrap.classList.remove('hidden');
        wrap.innerHTML = children.map(c => {
            const count = pendingCounts[c.id] || 0;
            return `
            <button onclick="selectChild(${c.id})" data-child-id="${c.id}"
                class="child-tab relative px-4 py-2 rounded-full text-sm font-bold transition-colors ${c.id === selectedStudentId ? 'bg-[#ffd709] text-[#6c5a00]' : 'bg-white border border-stone-200 text-stone-500 hover:bg-stone-50'}">
                ${esc(c.fullName)}
                ${count > 0 ? `<span class="ml-1.5 min-w-[18px] h-[18px] px-1 inline-flex items-center justify-center rounded-full bg-red-500 text-white text-[10px] font-black align-middle">${count > 99 ? '99+' : count}</span>` : ''}
            </button>`;
        }).join('');
    }

    async function selectChild(studentId) {
        selectedStudentId = studentId;
        renderChildSwitcher();

        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('fees-wrap').classList.remove('hidden');

        await loadFees();
    }

    async function loadFees() {
        try {
            const res = await fetch(`/api/fees/students/${selectedStudentId}`);
            fees = res.ok ? await res.json() : [];
        } catch (e) { fees = []; }

        renderBanner();
        renderHistory();

        await loadPendingCounts();
        renderChildSwitcher();
    }

    function renderBanner() {
        const banner = document.getElementById('status-banner');
        const pending = fees.filter(f => f.status === 'PENDING').sort((a,b) => a.dueDate.localeCompare(b.dueDate));

        if (!pending.length) {
            banner.className = 'rounded-2xl shadow-sm p-6 mb-6 flex items-center gap-4 bg-emerald-50 border border-emerald-100';
            banner.innerHTML = `
                <span class="material-symbols-outlined text-4xl text-emerald-500">check_circle</span>
                <div>
                    <p class="font-black text-emerald-700 font-headline">All fees paid</p>
                    <p class="text-sm text-emerald-600/80">There's nothing pending right now.</p>
                </div>`;
            return;
        }

        const next = pending[0];
        const overdue = isOverdue(next);
        const lateFeeNote = next.lateFeeAmount
            ? `RM ${fmtMoney(next.amount)} + RM ${fmtMoney(next.lateFeeAmount)} late fee = <span class="font-bold">RM ${fmtMoney(totalOf(next))}</span> · Due ${fmtDate(next.dueDate)}`
            : `RM ${fmtMoney(next.amount)} · Due ${fmtDate(next.dueDate)}`;
        banner.className = `rounded-2xl shadow-sm p-6 mb-6 flex items-center gap-4 ${overdue ? 'bg-red-50 border border-red-100' : 'bg-amber-50 border border-amber-100'}`;
        banner.innerHTML = `
            <span class="material-symbols-outlined text-4xl ${overdue ? 'text-red-500' : 'text-amber-500'}">${overdue ? 'error' : 'payments'}</span>
            <div class="flex-1">
                <p class="font-black ${overdue ? 'text-red-700' : 'text-amber-700'} font-headline">${overdue ? 'Overdue: ' : 'Pending: '}${esc(next.description)}</p>
                <p class="text-sm ${overdue ? 'text-red-600/80' : 'text-amber-600/80'}">${lateFeeNote}</p>
                <p class="text-xs ${overdue ? 'text-red-600/70' : 'text-amber-600/70'} mt-1">${next.lateFeeAmount ? 'A 5% late fee has been added because this is overdue.' : 'A 5% late fee applies automatically if unpaid after the due date.'}</p>
            </div>
            ${pending.length > 1 ? `<span class="text-xs font-bold ${overdue ? 'text-red-600' : 'text-amber-600'} bg-white/60 px-3 py-1 rounded-full mr-1">+${pending.length - 1} more</span>` : ''}
            <button onclick="payNow(${next.id})" data-pay-btn class="px-5 py-2.5 rounded-full bg-[#ffd709] text-[#6c5a00] font-bold text-sm hover:bg-[#f5cc00] transition-colors flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">Pay Now</button>`;
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const empty = document.getElementById('history-empty');
        if (!fees.length) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');

        const sorted = [...fees].sort((a,b) => b.dueDate.localeCompare(a.dueDate));
        list.innerHTML = sorted.map(f => {
            const overdue = isOverdue(f);
            let badge;
            if (f.status === 'PAID') badge = '<span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full">Paid</span>';
            else if (overdue) badge = '<span class="text-xs font-bold text-red-500 bg-red-50 px-2.5 py-1 rounded-full">Overdue</span>';
            else badge = '<span class="text-xs font-bold text-amber-500 bg-amber-50 px-2.5 py-1 rounded-full">Pending</span>';

            return `
            <div class="px-6 py-4 flex items-center justify-between gap-4">
                <div>
                    <p class="text-sm font-semibold text-stone-800">${esc(f.description)}</p>
                    <p class="text-xs text-stone-400 mt-0.5">Due ${fmtDate(f.dueDate)}${f.paidAt ? ` · Paid ${esc(f.paidAt.slice(0,10))}${paymentMethodLabel(f.paymentMethod) ? ' via ' + esc(paymentMethodLabel(f.paymentMethod)) : ''}` : ''}</p>
                    ${f.lateFeeAmount ? `<p class="text-xs text-red-500 font-semibold mt-0.5">+ RM ${fmtMoney(f.lateFeeAmount)} late fee added</p>` : ''}
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm font-bold text-stone-800">RM ${fmtMoney(totalOf(f))}</span>
                    ${badge}
                    ${f.status === 'PENDING' ? `<button onclick="payNow(${f.id})" data-pay-btn class="px-4 py-1.5 rounded-full bg-[#ffd709] text-[#6c5a00] font-bold text-xs hover:bg-[#f5cc00] transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Pay Now</button>` : ''}
                    ${f.status === 'PAID' ? `<button onclick="downloadReceipt(${f.id})" class="px-3 py-1.5 rounded-full border border-stone-200 text-stone-500 font-bold text-xs hover:bg-stone-50 transition-colors flex items-center gap-1"><span class="material-symbols-outlined text-sm">download</span>Receipt</button>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    // ── Stripe Checkout (test mode) — redirects to Stripe's hosted payment page ──
    function showToast(msg, ms=5000) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), ms);
    }

    // ── Choose Payment Method modal ───────────────────────────────────────────────
    let payingFeeId = null;
    function payNow(feeId) {
        const fee = fees.find(f => f.id === feeId);
        if (!fee) return;
        payingFeeId = feeId;
        document.getElementById('gw-description').textContent = fee.description;
        document.getElementById('gw-amount').textContent = `RM ${fmtMoney(totalOf(fee))}${fee.lateFeeAmount ? ' (incl. late fee)' : ''}`;
        document.getElementById('gateway-modal').classList.remove('hidden');
    }
    function closeGatewayModal() { document.getElementById('gateway-modal').classList.add('hidden'); }

    let payingInProgress = false;
    async function payWithGateway(gateway) {
        if (payingInProgress || payingFeeId == null) return;
        payingInProgress = true;
        closeGatewayModal();
        const btns = document.querySelectorAll('[data-pay-btn]');
        btns.forEach(b => { b.disabled = true; b.dataset.origText = b.textContent; b.textContent = 'Redirecting…'; });

        const endpoint = gateway === 'stripe'
            ? `/api/payments/checkout-session/${payingFeeId}`
            : `/api/payments/toyyibpay/bill/${payingFeeId}`;

        try {
            const res = await fetch(endpoint, { method: 'POST' });
            const data = await res.json().catch(() => ({}));
            if (res.ok && data.url) {
                window.location.href = data.url; // full navigation to the gateway — no need to restore buttons
            } else {
                showToast(data.error || 'Failed to start checkout.');
                resetPayButtons();
            }
        } catch (e) {
            showToast('Network error. Please try again.');
            resetPayButtons();
        }
    }

    function resetPayButtons() {
        payingInProgress = false;
        document.querySelectorAll('[data-pay-btn]').forEach(b => {
            b.disabled = false;
            if (b.dataset.origText) b.textContent = b.dataset.origText;
        });
    }

    function cleanUrlParams(keys) {
        const clean = new URL(location.href);
        keys.forEach(k => clean.searchParams.delete(k));
        history.replaceState(null, '', clean.toString());
    }

    // Handles the return trip from either gateway's redirect (Stripe's success_url/cancel_url,
    // or ToyyibPay's billReturnUrl — which appends its own status_id/billcode/order_id params).
    async function handlePaymentReturn() {
        const params = new URLSearchParams(location.search);
        const stripeSessionId = params.get('stripe_session_id');
        const canceled = params.get('payment') === 'canceled';
        const toyyibBillCode = params.get('billcode');
        const toyyibOrderId = params.get('order_id');

        if (stripeSessionId) {
            try {
                const res = await fetch(`/api/payments/checkout-session/${stripeSessionId}/confirm`);
                const data = await res.json().catch(() => ({}));
                showToast(res.ok && data.paid ? 'Payment successful! Thank you.' : 'Payment could not be confirmed yet.');
            } catch (e) {
                showToast('Could not confirm payment status.');
            }
            cleanUrlParams(['stripe_session_id']);
            await loadFees();
        } else if (toyyibBillCode && toyyibOrderId) {
            try {
                const res = await fetch(`/api/payments/toyyibpay/confirm?billCode=${encodeURIComponent(toyyibBillCode)}&feeId=${encodeURIComponent(toyyibOrderId)}`);
                const data = await res.json().catch(() => ({}));
                showToast(res.ok && data.paid ? 'Payment successful! Thank you.' : 'Payment could not be confirmed yet.');
            } catch (e) {
                showToast('Could not confirm payment status.');
            }
            cleanUrlParams(['billcode', 'order_id', 'status_id', 'msg', 'transaction_id']);
            await loadFees();
        } else if (canceled) {
            showToast('Payment canceled.');
            cleanUrlParams(['payment']);
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        loadSidebar('parent', 'fees');
        loadTopbar('parent');
        if (!myAccountId) { window.location.href = '/login.html'; return; }
        await loadChildren();
        await handlePaymentReturn();
    });
</script>
</body>
</html>
