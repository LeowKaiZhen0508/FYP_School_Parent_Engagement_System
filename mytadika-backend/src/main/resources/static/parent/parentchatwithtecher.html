<!DOCTYPE html>
<html class="light" lang="en" style="">

<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MyTadika - Chat Center</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFB800",
                        "primary-dim": "#E6A600",
                        "secondary": "#FF8A3D",
                        "secondary-container": "#FFF3E0",
                        "tertiary": "#FF6B6B",
                        "background": "#FFFDF5",
                        "surface": "#FFFDF5",
                        "surface-container": "#FEF9E7",
                        "surface-container-low": "#FFFBF0",
                        "surface-container-lowest": "#FFFFFF",
                        "on-primary": "#4A3B00",
                        "on-surface": "#4A453C",
                        "on-surface-variant": "#7C7464",
                        "outline": "#E5E1D1",
                        "outline-variant": "#F2EFE4",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "1.5rem",
                        "lg": "2.5rem",
                        "xl": "4rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFDF5;
            background-image: radial-gradient(#FFB800 0.8px, transparent 0.8px);
            background-size: 32px 32px;
            background-attachment: fixed;
        }

        body {
            background-color: #fcf6e3;
            background-image: radial-gradient(circle at 2px 2px, rgba(178, 173, 156, 0.1) 1px, transparent 0);
            background-size: 24px 24px;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #FFB80044;
            border-radius: 10px;
        }

        .chat-bubble-received {
            border-radius: 2rem 2rem 2rem 0.5rem;
        }

        .chat-bubble-sent {
            border-radius: 2rem 2rem 0.5rem 2rem;
        }
    </style>
    <script src="/components/sidebar-loader.js"></script>
</head>

<body class="text-[#312f23] min-h-screen">
    <!-- SideNavBar (loaded from component) -->

    <!-- Main Content Area -->
    <main class="ml-64 min-h-screen flex flex-col">

        <!-- Communication Module Container -->
        <div class="mt-16 p-5 flex gap-5 overflow-hidden" style="height:calc(100vh - 4rem);">
            <!-- Conversation Sidebar -->
            <section
                class="w-64 flex flex-col bg-[#f5edd8] rounded-[2rem] shadow-[0_8px_24px_rgba(49,47,35,0.08)] overflow-hidden flex-shrink-0">
                <div class="p-4 pb-2">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-sm text-[#312f23]">My Teachers</h3>
                        <button onclick="openAddModal()" title="Add Teacher"
                            class="w-8 h-8 rounded-full bg-[#ffd709] text-[#6c5a00] flex items-center justify-center hover:bg-[#eeab00] active:scale-90 transition-all shadow-sm">
                            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1;">add</span>
                        </button>
                    </div>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-base">search</span>
                        <input id="search-input"
                            class="w-full pl-10 pr-4 py-2.5 bg-[#eee8d3] border-none rounded-full text-sm focus:ring-4 focus:ring-[#ffd709]/30 transition-all placeholder:text-stone-400 font-medium text-[#312f23]"
                            placeholder="Find someone..." type="text">
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto custom-scrollbar px-3 pb-4">
                    <div id="conversation-list" class="space-y-2">
                        <p class="text-center text-on-surface-variant text-sm py-8">Loading...</p>
                    </div>
                </div>
            </section>

            <!-- Conversation Main View -->
            <section
                class="flex-1 bg-[#f5edd8] rounded-[2rem] shadow-[0_8px_24px_rgba(49,47,35,0.08)] overflow-hidden relative flex flex-col">

                <!-- ── Empty state ── -->
                <div id="view-empty"
                    style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;"
                    class="text-stone-400">
                    <span class="material-symbols-outlined text-5xl opacity-30">chat_bubble</span>
                    <p class="text-sm font-medium">Select a teacher to get started</p>
                </div>

                <!-- ── Profile View ── -->
                <div id="view-profile" style="display:none;flex:1;flex-direction:column;overflow-y:auto;"
                    class="custom-scrollbar">
                    <!-- Profile header bar -->
                    <div
                        class="flex items-center justify-between px-5 py-3 bg-[#f5edd8] border-b border-[#e3ddc5] flex-shrink-0">
                        <button onclick="showChatView()"
                            class="flex items-center gap-1.5 text-[#6c5a00] font-bold text-sm hover:opacity-70 transition-opacity">
                            <span class="material-symbols-outlined text-base">arrow_back</span>
                            Back to Chat
                        </button>
                    </div>
                    <!-- Banner + avatar -->
                    <div class="relative h-32 flex-shrink-0"
                        style="background-color:#ffd709;background-image:radial-gradient(circle at 2px 2px,rgba(108,90,0,0.15) 1px,transparent 0);background-size:24px 24px;">
                        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 z-10">
                            <div id="profile-avatar-wrap"
                                style="width:110px;height:110px;border-radius:50%;border:4px solid #f5edd8;box-shadow:0 8px 24px rgba(0,0,0,0.18);overflow:hidden;background:#ffd709;display:flex;align-items:center;justify-content:center;">
                                <img id="profile-avatar-img"
                                    style="width:100%;height:100%;object-fit:cover;display:none;border-radius:50%;cursor:pointer;"
                                    alt="Teacher" onclick="if(this.src) openLightbox(this.src, false)">
                                <span id="profile-avatar-initial"
                                    style="font-size:2.25rem;font-weight:900;color:#6c5a00;display:flex;align-items:center;justify-content:center;">?</span>
                            </div>
                        </div>
                    </div>
                    <!-- Profile body -->
                    <div class="pt-16 pb-8 px-6 text-center flex flex-col gap-5">
                        <!-- Name + status -->
                        <div class="flex flex-col items-center gap-1">
                            <h2 id="profile-name" class="text-2xl font-extrabold text-[#312f23]"></h2>
                            <div class="flex items-center gap-1.5 mt-0.5">
                                <span id="profile-status-dot" class="w-2 h-2 rounded-full bg-stone-400"></span>
                                <span id="profile-status" class="text-xs font-bold text-stone-400 uppercase tracking-wider">Offline</span>
                            </div>
                        </div>
                        <!-- Description -->
                        <p id="profile-description" class="text-sm text-stone-500 leading-relaxed"></p>
                        <!-- Contact info (email + phone) -->
                        <div id="profile-contact-info" class="w-full space-y-2">
                            <div class="flex items-center gap-3 bg-[#eee8d3] rounded-2xl px-4 py-3 text-left">
                                <span class="material-symbols-outlined text-lg text-[#6c5a00] flex-shrink-0">mail</span>
                                <div class="min-w-0">
                                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wide">Email</p>
                                    <p id="profile-contact-email" class="text-sm font-semibold text-stone-700 truncate">—</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 bg-[#eee8d3] rounded-2xl px-4 py-3 text-left">
                                <span class="material-symbols-outlined text-lg text-[#6c5a00] flex-shrink-0">call</span>
                                <div class="min-w-0">
                                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wide">Phone</p>
                                    <p id="profile-contact-phone" class="text-sm font-semibold text-stone-700 truncate">—</p>
                                </div>
                            </div>
                        </div>
                        <!-- Stat cards (teachers only) -->
                        <div id="profile-stats-grid" class="grid grid-cols-3 gap-4">
                            <div class="bg-[#eee8d3] p-5 rounded-[2rem] border border-white flex flex-col items-center hover:scale-105 hover:shadow-md transition-all duration-200 cursor-default">
                                <span class="material-symbols-outlined text-[#ffd709] text-3xl mb-2 block" style="font-variation-settings:'FILL' 1;">school</span>
                                <p id="profile-qualification" class="font-extrabold text-[#312f23] text-sm mb-1">—</p>
                                <p class="text-[10px] text-stone-400 font-bold uppercase tracking-wider">Qualification</p>
                            </div>
                            <div class="bg-[#eee8d3] p-5 rounded-[2rem] border border-white flex flex-col items-center hover:scale-105 hover:shadow-md transition-all duration-200 cursor-default">
                                <span class="material-symbols-outlined text-[#FF8A3D] text-3xl mb-2 block" style="font-variation-settings:'FILL' 1;">history_edu</span>
                                <p id="profile-experience" class="font-extrabold text-[#312f23] text-sm mb-1">—</p>
                                <p class="text-[10px] text-stone-400 font-bold uppercase tracking-wider">Experience</p>
                            </div>
                            <div class="bg-[#eee8d3] p-5 rounded-[2rem] border border-white flex flex-col items-center hover:scale-105 hover:shadow-md transition-all duration-200 cursor-default">
                                <span class="material-symbols-outlined text-[#FF6B6B] text-3xl mb-2 block" style="font-variation-settings:'FILL' 1;">volunteer_activism</span>
                                <p id="profile-focus" class="font-extrabold text-[#312f23] text-sm mb-1">—</p>
                                <p class="text-[10px] text-stone-400 font-bold uppercase tracking-wider">Focus Area</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── Chat View ── -->
                <div id="view-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
                    <!-- Chat Header -->
                    <div
                        class="px-6 py-3 border-b border-[#e3ddc5] flex justify-between items-center bg-[#f5edd8] flex-shrink-0">
                        <button
                            class="flex items-center gap-3 hover:opacity-75 transition-opacity cursor-pointer text-left"
                            onclick="showProfileView()">
                            <div id="chat-avatar"
                                class="w-9 h-9 rounded-full bg-[#ffd709]/40 flex items-center justify-center text-[#6c5a00] font-black text-sm ring-2 ring-[#ffd709]/20 overflow-hidden flex-shrink-0">
                            </div>
                            <div>
                                <h3 id="chat-teacher-name"
                                    class="font-headline font-extrabold text-[#312f23] text-base leading-tight"></h3>
                                <p
                                    class="text-[10px] text-[#6c5a00] font-black flex items-center gap-1.5 uppercase tracking-widest">
                                    <span id="chat-status-dot" class="w-1.5 h-1.5 rounded-full bg-stone-400"></span>
                                    <span id="chat-status-text">tap to view profile</span>
                                </p>
                            </div>
                        </button>
                    </div>

                    <!-- Chat Messages -->
                    <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-5 custom-scrollbar"
                        style="flex:1;min-height:0;background-color:#fcf6e3;background-image:radial-gradient(circle at 2px 2px,rgba(178,173,156,0.18) 1px,transparent 0);background-size:24px 24px;">
                    </div>

                    <!-- Chat Input -->
                    <div class="p-4 bg-[#f5edd8] border-t border-[#e3ddc5] flex-shrink-0">
                        <!-- Reply preview bar -->
                        <div id="reply-preview-bar" class="hidden mb-2 flex items-center gap-2 px-3 py-2 bg-[#eee8d3] rounded-xl border-l-4 border-[#ffd709]">
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-bold text-[#6c5a00]" id="reply-preview-label"></p>
                                <p class="text-xs text-stone-500 truncate" id="reply-preview-text"></p>
                            </div>
                            <button onclick="cancelReply()" class="w-6 h-6 flex-shrink-0 bg-white/60 rounded-full flex items-center justify-center text-stone-500 hover:bg-red-100 hover:text-red-500 transition-all">
                                <span class="material-symbols-outlined text-sm">close</span>
                            </button>
                        </div>
                        <!-- Image preview strip -->
                        <div id="image-preview-wrap" class="hidden mb-2 flex items-center gap-2 px-1">
                            <img id="image-preview" class="h-16 rounded-xl object-cover border border-[#e3ddc5]"
                                alt="preview">
                            <button onclick="cancelImage()"
                                class="w-6 h-6 bg-[#eee8d3] rounded-full flex items-center justify-center text-stone-500 hover:bg-red-100 hover:text-red-500 transition-all">
                                <span class="material-symbols-outlined text-sm">close</span>
                            </button>
                        </div>
                        <div class="relative flex items-center gap-3 bg-[#eee8d3] rounded-[2rem] p-2 pr-2.5 focus-within:ring-4 focus-within:ring-[#ffd709]/20 transition-all">
                            <input id="image-file-input" type="file" accept="image/*" class="hidden">
                            <input id="file-file-input" type="file" accept="*/*" class="hidden">
                            <!-- Attach popup -->
                            <div id="attach-popup" class="hidden absolute bottom-14 left-1 bg-[#f5edd8] border border-[#e3ddc5] rounded-2xl shadow-xl overflow-hidden z-20 min-w-[140px]">
                                <button onclick="document.getElementById('image-file-input').click(); closeAttachPopup()" class="flex items-center gap-3 px-4 py-3 hover:bg-[#eee8d3] w-full text-left text-sm font-bold text-[#312f23] transition-colors">
                                    <span class="material-symbols-outlined text-[#ffd709] text-lg" style="font-variation-settings:'FILL' 1;">image</span>
                                    Photo
                                </button>
                                <div class="h-px bg-[#e3ddc5] mx-3"></div>
                                <button onclick="document.getElementById('file-file-input').click(); closeAttachPopup()" class="flex items-center gap-3 px-4 py-3 hover:bg-[#eee8d3] w-full text-left text-sm font-bold text-[#312f23] transition-colors">
                                    <span class="material-symbols-outlined text-[#FF8A3D] text-lg" style="font-variation-settings:'FILL' 1;">attach_file</span>
                                    File
                                </button>
                            </div>
                            <button id="attach-btn" onclick="toggleAttachPopup()"
                                class="w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-full text-[#6c5a00] hover:bg-[#ffd709]/30 transition-all"
                                title="Attach">
                                <span class="material-symbols-outlined text-xl">add</span>
                            </button>
                            <textarea id="message-input"
                                class="flex-1 bg-transparent border-none focus:ring-0 resize-none py-2 px-1 text-sm max-h-24 placeholder:text-stone-400 font-medium"
                                placeholder="Share a message..." rows="1"></textarea>
                            <button id="send-btn"
                                class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all flex-shrink-0">
                                <span class="material-symbols-outlined text-xl"
                                    style="font-variation-settings: 'FILL' 1;">send</span>
                            </button>
                        </div>
                    </div>
                </div><!-- end view-chat -->

            </section>
        </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden fixed inset-0 z-[60] flex items-center justify-center" onclick="closeLightbox()">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
        <div class="absolute top-5 right-5 z-10 flex gap-2">
            <button id="lightbox-download-btn"
                class="w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-all"
                onclick="downloadLightboxImage()">
                <span class="material-symbols-outlined">download</span>
            </button>
            <button
                class="w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-all"
                onclick="closeLightbox()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <img id="lightbox-img" src="" alt="full image"
            class="relative z-10 max-w-[90vw] max-h-[90vh] object-contain rounded-2xl shadow-2xl transition-all duration-300 scale-95 opacity-0"
            onclick="event.stopPropagation()">
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal"
        class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-[#f5edd8] rounded-[2rem] p-8 w-full max-w-md shadow-2xl">
            <h3 class="font-bold text-lg mb-4">Edit Message</h3>
            <textarea id="edit-input"
                class="w-full border border-[#e3ddc5] bg-[#eee8d3] rounded-xl p-4 text-sm resize-none focus:ring-2 focus:ring-[#ffd709]/30 focus:outline-none text-[#312f23]"
                rows="4"></textarea>
            <div class="flex gap-3 mt-4 justify-end">
                <button id="edit-cancel"
                    class="px-6 py-2 rounded-full font-bold text-on-surface-variant hover:bg-surface-container transition-colors">Cancel</button>
                <button id="edit-save"
                    class="px-6 py-2 rounded-full font-bold bg-primary text-on-primary hover:bg-primary-dim transition-colors">Save</button>
            </div>
        </div>
    </div>

    <script>
        let myAccountId = localStorage.getItem('accountId') || sessionStorage.getItem('accountId');
        let myName = localStorage.getItem('fullName') || sessionStorage.getItem('fullName') || 'Parent';
        let selectedTeacherId = null;
        let selectedTeacherName = '';
        let selectedTeacher = null;
        let pollInterval = null;
        let editingMessageId = null;
        let currentMessages = [];
        let replyingTo = null;
        let allTeachers = [];
        let isFirstMessageLoad = false;
        let userScrolledUp = false;
        let pendingImageUrl = null;

        function showView(name) {
            ['view-empty', 'view-profile', 'view-chat'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
            document.getElementById('view-' + name).style.display = 'flex';
        }

        function showProfileView() {
            if (!selectedTeacher) return;
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

            document.getElementById('profile-name').textContent = selectedTeacher.fullName;

            const isAdminInbox = selectedTeacherId === adminInboxId;
            document.getElementById('profile-stats-grid').classList.toggle('hidden', isAdminInbox);
            document.getElementById('profile-contact-email').textContent = selectedTeacher.email || 'Not available';
            document.getElementById('profile-contact-phone').textContent = selectedTeacher.phoneNumber || 'Not available';
            if (isAdminInbox) {
                document.getElementById('profile-description').textContent = 'Reach the school admin team here.';
            } else {
                document.getElementById('profile-description').textContent =
                    selectedTeacher.description || 'No description yet.';
                document.getElementById('profile-qualification').textContent = selectedTeacher.qualification || '—';
                document.getElementById('profile-experience').textContent = selectedTeacher.experience || '—';
                document.getElementById('profile-focus').textContent = selectedTeacher.focusArea || '—';
            }

            // Avatar
            const initial = selectedTeacher.fullName.charAt(0).toUpperCase();
            document.getElementById('profile-avatar-initial').textContent = initial;
            const img = document.getElementById('profile-avatar-img');
            if (selectedTeacher.profileImageUrl) {
                img.src = selectedTeacher.profileImageUrl;
                img.style.display = 'block';
                document.getElementById('profile-avatar-initial').style.display = 'none';
            } else {
                img.style.display = 'none';
                document.getElementById('profile-avatar-initial').style.display = 'flex';
            }

            // Real status
            const online = isOnline(selectedTeacher.lastActiveAt);
            const statusEl = document.getElementById('profile-status');
            statusEl.textContent = online ? 'Available' : 'Offline';
            statusEl.className = `text-xs font-bold uppercase tracking-wider ${online ? 'text-green-600' : 'text-stone-400'}`;
            const statusDot2 = document.getElementById('profile-status-dot');
            if (statusDot2) statusDot2.className = `w-2 h-2 rounded-full ${online ? 'bg-green-500 animate-pulse' : 'bg-stone-400'}`;

            showView('profile');
        }

        function showChatView() {
            showView('chat');
            isFirstMessageLoad = true;
            loadMessages();
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(loadMessages, 4000);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            loadSidebar('parent', 'messages'); loadTopbar('parent');
            if (!myAccountId) {
                window.location.href = '/login.html';
                return;
            }

            showView('empty');
            await Promise.all([loadAdminInbox(), loadTeachers()]);

            // Deep link from e.g. the zero-children empty state: ?openAdmin=1
            const deepLinkParams = new URLSearchParams(location.search);
            if (deepLinkParams.get('openAdmin') === '1' && adminInboxId) {
                selectTeacher(adminInboxId, adminInboxName);
                history.replaceState(null, '', location.pathname);
            }

            // Deep link to a specific teacher, e.g. from the parent home page's "Message Teacher" quick action: ?teacherId=
            const deepLinkTeacherId = deepLinkParams.get('teacherId');
            if (deepLinkTeacherId) {
                const teacher = allTeachers.find(t => t.accountId === deepLinkTeacherId);
                if (teacher) selectTeacher(teacher.accountId, teacher.fullName);
                history.replaceState(null, '', location.pathname);
            }

            // Heartbeat: update lastActiveAt every 60s so status shows correctly
            const sendHeartbeat = () => fetch(`/api/presence/heartbeat/${myAccountId}`, { method: 'POST' }).catch(() => { });
            sendHeartbeat();
            setInterval(sendHeartbeat, 60000);

            // Poll contacts every 10s to refresh unread counts
            setInterval(() => {
                fetch(`/api/chat/contacts/${myAccountId}`)
                    .then(r => r.json())
                    .then(data => { allTeachers = data; renderTeacherList(data); })
                    .catch(() => {});
                refreshAdminInboxPreview();
            }, 10000);

            document.getElementById('send-btn').addEventListener('click', sendMessage);
            document.getElementById('message-input').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });
            document.getElementById('search-input').addEventListener('input', filterTeachers);
            document.getElementById('edit-cancel').addEventListener('click', closeEditModal);
            document.getElementById('edit-save').addEventListener('click', saveEdit);
            document.getElementById('image-file-input').addEventListener('change', handleImageSelected);
            document.getElementById('file-file-input').addEventListener('change', handleFileSelected);

            document.getElementById('messages-container').addEventListener('scroll', function () {
                const atBottom = this.scrollHeight - this.clientHeight <= this.scrollTop + 80;
                userScrolledUp = !atBottom;
            });
        });

        async function loadTeachers() {
            try {
                const res = await fetch(`/api/chat/contacts/${myAccountId}`);
                allTeachers = await res.json();
                renderTeacherList(allTeachers);
            } catch (e) {
                document.getElementById('conversation-list').innerHTML =
                    '<p class="text-center text-tertiary text-sm py-8">Failed to load</p>';
            }
        }

        // ── Shared "School Admin" inbox (pinned, always present) ─────────────────
        let adminInboxId = null;
        let adminInboxName = 'School Admin';
        let adminInboxPreview = { lastMessage: null, unreadCount: 0 };
        let adminInboxInfo = { email: null, phoneNumber: null, lastActiveAt: null, profileImageUrl: null };

        async function loadAdminInbox() {
            try {
                const res = await fetch('/api/chat/admin-inbox/identity');
                if (!res.ok) return;
                const data = await res.json();
                adminInboxId = data.accountId;
                adminInboxName = data.fullName || 'School Admin';
                adminInboxInfo = {
                    email: data.email,
                    phoneNumber: data.phoneNumber,
                    lastActiveAt: data.lastActiveAt,
                    profileImageUrl: data.profileImageUrl
                };
                await refreshAdminInboxPreview();
            } catch (e) {}
        }

        async function refreshAdminInboxPreview() {
            if (!adminInboxId) return;
            try {
                const res = await fetch(`/api/chat/messages/${myAccountId}/${adminInboxId}`);
                const msgs = res.ok ? await res.json() : [];
                const last = msgs.length ? msgs[msgs.length - 1] : null;
                const unread = msgs.filter(m => m.receiverId === myAccountId && !m.read).length;
                adminInboxPreview = {
                    lastMessage: last ? (last.messageType === 'image' ? '📷 Image' : last.messageType === 'file' ? '📎 File' : last.content) : null,
                    unreadCount: unread
                };
            } catch (e) {}
            renderTeacherList(allTeachers);
        }

        function renderAdminInboxItem() {
            const hasUnread = adminInboxPreview.unreadCount > 0;
            const isSelected = adminInboxId === selectedTeacherId;
            const badgeHtml = hasUnread
                ? `<span class="ml-1 min-w-[18px] h-[18px] px-1 rounded-full bg-[#FFB800] text-[#4A3B00] text-[10px] font-black flex items-center justify-center flex-shrink-0">${adminInboxPreview.unreadCount > 99 ? '99+' : adminInboxPreview.unreadCount}</span>`
                : '';
            const lastMsg = adminInboxPreview.lastMessage
                ? `<p class="text-xs truncate ${hasUnread ? 'font-semibold text-[#312f23]' : 'text-stone-400'}">${escapeHtml(adminInboxPreview.lastMessage)}</p>`
                : `<p class="text-xs text-stone-300 italic">Message the school admin</p>`;
            const avatarHtml = adminInboxInfo.profileImageUrl
                ? `<img src="${escapeAttr(adminInboxInfo.profileImageUrl)}" class="w-full h-full object-cover" alt="">`
                : `<span class="material-symbols-outlined text-white text-lg">admin_panel_settings</span>`;
            return `
            <div onclick="selectTeacher('${adminInboxId}', '${escapeAttr(adminInboxName)}')"
                class="teacher-item flex items-center gap-2.5 p-2.5 rounded-[1.5rem] cursor-pointer transition-all mx-1 mb-2 border ${isSelected ? 'bg-[#ffd709]/30 border-[#ffd709]/60' : 'border-[#ffd709]/40 bg-[#fffaf0] hover:bg-[#ffd709]/15'}"
                data-id="${adminInboxId}">
                <div class="w-9 h-9 rounded-full bg-[#6c5a00] flex items-center justify-center flex-shrink-0 overflow-hidden">
                    ${avatarHtml}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1">
                        <h4 class="font-bold text-sm truncate text-[#312f23] flex-1">${escapeHtml(adminInboxName)}</h4>
                        <span class="material-symbols-outlined text-[13px] text-[#eeab00]" title="Pinned" style="font-variation-settings:'FILL' 1">push_pin</span>
                        ${badgeHtml}
                    </div>
                    ${lastMsg}
                </div>
            </div>`;
        }

        function updateNavBadge(teachers) {
            const total = (teachers || []).reduce((sum, t) => sum + (t.unreadCount || 0), 0) + (adminInboxPreview.unreadCount || 0);
            const badge = document.getElementById('nav-unread-badge');
            if (!badge) return;
            if (total > 0) {
                badge.textContent = total > 99 ? '99+' : total;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderTeacherList(teachers) {
            updateNavBadge(teachers);
            const list = document.getElementById('conversation-list');
            const pinnedHtml = adminInboxId ? renderAdminInboxItem() : '';
            if (!teachers || teachers.length === 0) {
                list.innerHTML = pinnedHtml +
                    `<div class="flex flex-col items-center gap-3 py-10 text-stone-400">
                        <span class="material-symbols-outlined text-4xl opacity-30">group_add</span>
                        <p class="text-xs font-medium text-center">No teachers yet.<br>Tap <strong>+</strong> to add one.</p>
                    </div>`;
                return;
            }
            list.innerHTML = pinnedHtml + teachers.map(t => {
                const hasUnread = t.unreadCount > 0;
                const isSelected = t.accountId === selectedTeacherId;
                const avatarHtml = t.profileImageUrl
                    ? `<img src="${t.profileImageUrl}" class="w-full h-full object-cover rounded-full" alt="">`
                    : `<span class="font-black text-sm text-[#6c5a00]">${t.fullName.charAt(0).toUpperCase()}</span>`;
                const badgeHtml = hasUnread
                    ? `<span class="ml-1 min-w-[18px] h-[18px] px-1 rounded-full bg-[#FFB800] text-[#4A3B00] text-[10px] font-black flex items-center justify-center flex-shrink-0">${t.unreadCount > 99 ? '99+' : t.unreadCount}</span>`
                    : '';
                const lastMsg = t.lastMessage
                    ? `<p class="text-xs truncate ${hasUnread ? 'font-semibold text-[#312f23]' : 'text-stone-400'}">${escapeHtml(t.lastMessage)}</p>`
                    : `<p class="text-xs text-stone-300 italic">No messages yet</p>`;
                return `
                <div onclick="selectTeacher('${t.accountId}', '${escapeAttr(t.fullName)}')"
                    class="teacher-item flex items-center gap-2.5 p-2.5 rounded-[1.5rem] cursor-pointer transition-all mx-1 ${isSelected ? 'bg-[#ffd709]/30 border border-[#ffd709]/60' : 'hover:bg-[#ffd709]/15'}"
                    data-id="${t.accountId}">
                    <div class="w-9 h-9 rounded-full bg-[#ffd709]/40 flex items-center justify-center flex-shrink-0 overflow-hidden">
                        ${avatarHtml}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-1">
                            <h4 class="font-bold text-sm truncate ${hasUnread ? 'text-[#312f23]' : 'text-[#312f23]'} flex-1">${escapeHtml(t.fullName)}</h4>
                            ${badgeHtml}
                        </div>
                        ${lastMsg}
                    </div>
                </div>`;
            }).join('');
        }

        function filterTeachers() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allTeachers.filter(t =>
                t.fullName.toLowerCase().includes(q) || (t.email || '').toLowerCase().includes(q)
            );
            renderTeacherList(filtered);
        }

        // ── Add Teacher Modal ─────────────────────────────────────────────────
        let allAvailableTeachers = [];

        async function openAddModal() {
            document.getElementById('add-teacher-modal').classList.remove('hidden');
            document.getElementById('add-search-input').value = '';
            document.getElementById('add-teacher-list').innerHTML =
                '<p class="text-center text-stone-400 text-sm py-8">Loading…</p>';
            try {
                const res = await fetch('/api/chat/teachers');
                allAvailableTeachers = await res.json();
                // Filter out already-added contacts
                const addedIds = new Set(allTeachers.map(t => t.accountId));
                const available = allAvailableTeachers.filter(t => !addedIds.has(t.accountId));
                renderAddList(available);
            } catch (e) {
                document.getElementById('add-teacher-list').innerHTML =
                    '<p class="text-center text-red-400 text-sm py-8">Failed to load teachers</p>';
            }
        }

        function closeAddModal() {
            document.getElementById('add-teacher-modal').classList.add('hidden');
        }

        function filterAddList() {
            const q = document.getElementById('add-search-input').value.toLowerCase();
            const addedIds = new Set(allTeachers.map(t => t.accountId));
            const available = allAvailableTeachers.filter(t =>
                !addedIds.has(t.accountId) &&
                (t.fullName.toLowerCase().includes(q) || (t.email || '').toLowerCase().includes(q))
            );
            renderAddList(available);
        }

        function renderAddList(teachers) {
            const el = document.getElementById('add-teacher-list');
            if (!teachers.length) {
                el.innerHTML = '<p class="text-center text-stone-400 text-sm py-8">No teachers available</p>';
                return;
            }
            el.innerHTML = teachers.map(t => {
                const avatarHtml = t.profileImageUrl
                    ? `<img src="${t.profileImageUrl}" class="w-full h-full object-cover rounded-full" alt="">`
                    : `<span class="font-black text-sm text-[#6c5a00]">${t.fullName.charAt(0).toUpperCase()}</span>`;
                return `
                <div class="flex items-center gap-3 p-3 rounded-[1.25rem] hover:bg-[#ffd709]/10 transition-colors">
                    <div class="w-10 h-10 rounded-full bg-[#ffd709]/40 flex items-center justify-center flex-shrink-0 overflow-hidden">
                        ${avatarHtml}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-sm text-[#312f23] truncate">${escapeHtml(t.fullName)}</h4>
                        <p class="text-xs text-stone-400 truncate">${t.qualification || t.email || ''}</p>
                    </div>
                    <button onclick="addTeacher('${t.accountId}')"
                        class="flex-shrink-0 px-3 py-1.5 bg-[#ffd709] text-[#6c5a00] text-xs font-bold rounded-full hover:bg-[#eeab00] active:scale-95 transition-all">
                        Add
                    </button>
                </div>`;
            }).join('');
        }

        async function addTeacher(teacherId) {
            try {
                await fetch('/api/chat/contacts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parentId: myAccountId, teacherId })
                });
                await loadTeachers();
                // Remove from available list
                const addedIds = new Set(allTeachers.map(t => t.accountId));
                const remaining = allAvailableTeachers.filter(t => !addedIds.has(t.accountId));
                renderAddList(remaining);
                if (remaining.length === 0) closeAddModal();
            } catch (e) {
                alert('Failed to add teacher. Please try again.');
            }
        }

        function selectTeacher(teacherId, teacherName) {
            selectedTeacherId = teacherId;
            selectedTeacherName = teacherName;
            cancelReply();
            selectedTeacher = allTeachers.find(t => t.accountId === teacherId) ||
                (teacherId === adminInboxId
                    ? { accountId: teacherId, fullName: teacherName, ...adminInboxInfo }
                    : { accountId: teacherId, fullName: teacherName });

            // Update chat header avatar
            document.getElementById('chat-teacher-name').textContent = teacherName;
            const avatarEl = document.getElementById('chat-avatar');
            if (selectedTeacher.profileImageUrl) {
                avatarEl.innerHTML = `<img src="${selectedTeacher.profileImageUrl}" class="w-full h-full object-cover rounded-full" alt="">`;
            } else {
                avatarEl.textContent = teacherName.charAt(0).toUpperCase();
            }

            // Update chat header status
            const statusDot = document.getElementById('chat-status-dot');
            const statusText = document.getElementById('chat-status-text');
            const online = isOnline(selectedTeacher.lastActiveAt);
            if (statusDot) statusDot.className = `w-1.5 h-1.5 rounded-full ${online ? 'bg-green-500 animate-pulse' : 'bg-stone-400'}`;
            if (statusText) statusText.textContent = online ? 'Available · tap to view profile' : 'Offline · tap to view profile';

            renderTeacherList(allTeachers);
            userScrolledUp = false;
            showChatView();
            // Mark messages from this teacher as read
            fetch(`/api/chat/read/${myAccountId}/${teacherId}`, { method: 'PUT' })
                .then(() => loadTeachers())
                .catch(() => {});
        }

        function callTeacher() {
            if (!selectedTeacher || !selectedTeacher.phoneNumber) {
                alert('No phone number available for this teacher.');
                return;
            }
            window.location.href = 'tel:' + selectedTeacher.phoneNumber;
        }


        function isOnline(lastActiveAt) {
            if (!lastActiveAt) return false;
            const last = new Date(lastActiveAt);
            return (Date.now() - last.getTime()) < 5 * 60 * 1000;
        }

        async function loadMessages() {
            if (!selectedTeacherId) return;
            try {
                const res = await fetch(`/api/chat/messages/${myAccountId}/${selectedTeacherId}`);
                const messages = await res.json();
                renderMessages(messages);
            } catch (e) {
                console.error('Failed to load messages', e);
            }
        }

        function getDateLabel(sentAt) {
            const d = new Date(sentAt);
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);
            if (d.toDateString() === today.toDateString()) return 'Today';
            if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        }

        function renderMessages(messages) {
            currentMessages = messages;
            const container = document.getElementById('messages-container');
            const shouldScroll = isFirstMessageLoad || !userScrolledUp;
            isFirstMessageLoad = false;

            if (messages.length === 0) {
                container.innerHTML = `<div class="flex items-center justify-center h-full">
                    <p class="text-on-surface-variant text-sm">No messages yet. Say hello! 👋</p>
                </div>`;
                return;
            }

            let lastLabel = null;
            const parts = [];

            messages.forEach(m => {
                const label = getDateLabel(m.sentAt);
                if (label !== lastLabel) {
                    parts.push(`<div class="flex justify-center my-2">
                        <span class="px-5 py-1.5 bg-[#eee8d3] text-[#6c5a00] text-[11px] font-black rounded-full uppercase tracking-widest shadow-sm">${label}</span>
                    </div>`);
                    lastLabel = label;
                }

                const isMine = m.senderId === myAccountId;
                const time = formatTime(m.sentAt);
                const isImage = m.messageType === 'image';
                const isFile = m.messageType === 'file';
                const editedTag = m.edited ? ' <span class="text-[10px] opacity-50 font-normal">(edited)</span>' : '';
                const readIcon = m.read
                    ? `<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings:'wght' 700;">done_all</span>`
                    : `<span class="material-symbols-outlined text-sm text-stone-400" style="font-variation-settings:'wght' 700;">done</span>`;
                let fileData = null;
                if (isFile) { try { fileData = JSON.parse(m.content); } catch(e) { fileData = { url: m.content, name: 'File' }; } }
                const bubbleContent = isImage
                    ? `<img src="${escapeHtml(m.content)}" class="max-w-[220px] rounded-xl object-cover cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('${escapeHtml(m.content)}')" alt="image">`
                    : isFile
                    ? `<a href="${escapeHtml(fileData.url)}" target="_blank" download="${escapeHtml(fileData.name)}" class="flex items-center gap-3 px-4 py-3 rounded-2xl ${isMine ? 'bg-[#f0ca00]/40' : 'bg-[#d8d2bc]'} hover:opacity-80 transition-opacity min-w-[180px]">
                            <span class="material-symbols-outlined text-2xl text-[#6c5a00]" style="font-variation-settings:'FILL' 1;">description</span>
                            <div class="flex-1 overflow-hidden">
                                <p class="text-xs font-bold text-[#312f23] truncate max-w-[140px]">${escapeHtml(fileData.name)}</p>
                                <p class="text-[10px] text-stone-500 font-medium">${fileData.size ? formatFileSize(fileData.size) : 'File'}</p>
                            </div>
                            <span class="material-symbols-outlined text-base text-[#6c5a00]">download</span>
                        </a>`
                    : `${escapeHtml(m.content)}${editedTag}`;
                let replyQuoteHtml = '';
                if (m.replyToId) {
                    const quoted = currentMessages.find(x => x.id === m.replyToId);
                    if (quoted) {
                        const quotedLabel = quoted.senderId === myAccountId ? 'You' : selectedTeacherName;
                        const quotedRaw = quoted.messageType === 'image' ? '📷 Photo' : quoted.messageType === 'file' ? '📎 File' : quoted.content;
                        const quotedText = quotedRaw.length > 60 ? quotedRaw.slice(0, 60) + '…' : quotedRaw;
                        replyQuoteHtml = `<div onclick="scrollToMessage(${quoted.id})" class="reply-quote mb-1.5 px-3 py-1.5 rounded-xl border-l-4 ${isMine ? 'border-white/60 bg-black/10' : 'border-[#ffd709] bg-black/5'} text-xs cursor-pointer">
                            <p class="font-bold opacity-80">${escapeHtml(quotedLabel)}</p>
                            <p class="opacity-70 truncate max-w-[200px]">${escapeHtml(quotedText)}</p>
                        </div>`;
                    } else {
                        replyQuoteHtml = `<div class="reply-quote mb-1.5 px-3 py-1.5 rounded-xl border-l-4 border-stone-400 bg-black/5 text-xs italic opacity-60">Original message unavailable</div>`;
                    }
                }
                const replyBtn = `<button onclick="startReply(${m.id})" class="w-8 h-8 bg-[#eee8d3] shadow-lg rounded-full text-[#6c5a00] hover:bg-[#ffd709] flex items-center justify-center transition-all scale-90 hover:scale-100" title="Reply">
                                <span class="material-symbols-outlined text-xs">reply</span>
                            </button>`;
                const editDeleteBtns = (!isImage && !isFile) ? `
                        <div class="absolute -left-28 top-1/2 -translate-y-1/2 flex gap-1 opacity-0 group-hover/msg:opacity-100 transition-opacity">
                            ${replyBtn}
                            <button onclick="openEditModal(${m.id}, '${escapeAttr(m.content)}')" class="w-8 h-8 bg-[#eee8d3] shadow-lg rounded-full text-[#6c5a00] hover:bg-[#ffd709] flex items-center justify-center transition-all scale-90 hover:scale-100">
                                <span class="material-symbols-outlined text-xs">edit</span>
                            </button>
                            <button onclick="deleteMessage(${m.id})" class="w-8 h-8 bg-[#eee8d3] shadow-lg rounded-full text-red-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-all scale-90 hover:scale-100">
                                <span class="material-symbols-outlined text-xs">delete</span>
                            </button>
                        </div>` : `
                        <div class="absolute -left-20 top-1/2 -translate-y-1/2 flex gap-1 opacity-0 group-hover/msg:opacity-100 transition-opacity">
                            ${replyBtn}
                            <button onclick="deleteMessage(${m.id})" class="w-8 h-8 bg-[#eee8d3] shadow-lg rounded-full text-red-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-all scale-90 hover:scale-100">
                                <span class="material-symbols-outlined text-xs">delete</span>
                            </button>
                        </div>`;
                const receivedReplyBtn = `
                        <div class="absolute -right-10 top-1/2 -translate-y-1/2 flex gap-1 opacity-0 group-hover/msg:opacity-100 transition-opacity">
                            ${replyBtn}
                        </div>`;

                let bubble;
                if (isMine) {
                    bubble = `
                        <div class="flex flex-row-reverse gap-4 max-w-[75%] ml-auto transition-all rounded-2xl" data-msg-id="${m.id}">
                            <div class="relative flex flex-col items-end">
                                <div class="${(isImage || isFile) ? 'relative group/msg' : 'chat-bubble-sent bg-primary text-on-primary p-3.5 shadow-md shadow-primary/20 leading-relaxed text-sm font-semibold relative group/msg'}">
                                    ${replyQuoteHtml}
                                    ${bubbleContent}
                                    ${editDeleteBtns}
                                </div>
                                <div class="flex items-center gap-1.5 mt-1.5 mr-2">
                                    <p class="text-[10px] font-bold text-stone-400">${time}</p>
                                    ${readIcon}
                                </div>
                            </div>
                        </div>`;
                } else {
                    bubble = `
                        <div class="flex gap-3 max-w-[75%] transition-all rounded-2xl" data-msg-id="${m.id}">
                            <div class="w-8 h-8 rounded-full bg-[#ffd709]/40 flex items-center justify-center text-[#6c5a00] font-black text-xs self-end mb-5 flex-shrink-0">
                                ${selectedTeacherName.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="relative group/msg ${(isImage || isFile) ? '' : 'chat-bubble-received bg-[#eee8d3] text-[#312f23] p-3.5 shadow-sm leading-relaxed text-sm font-medium'}">
                                    ${replyQuoteHtml}
                                    ${bubbleContent}
                                    ${receivedReplyBtn}
                                </div>
                                <p class="text-[10px] font-bold text-stone-400 mt-1.5 ml-2">${time}</p>
                            </div>
                        </div>`;
                }
                parts.push(bubble);
            });

            container.innerHTML = parts.join('');
            if (shouldScroll) setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
        }

        let sendingMessage = false;
        async function sendMessage() {
            if (!selectedTeacherId || sendingMessage) return;
            sendingMessage = true;
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            try {
                // Send pending image if any
                if (pendingImageUrl) {
                    try {
                        const r = await fetch('/api/chat/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                senderId: myAccountId,
                                receiverId: selectedTeacherId,
                                content: pendingImageUrl,
                                messageType: 'image',
                                replyToId: replyingTo ? replyingTo.id : null
                            })
                        });
                        if (!r.ok) {
                            const err = await r.json().catch(() => ({}));
                            alert('Failed to send image: ' + (err.error || r.status));
                            return;
                        }
                    } catch (e) {
                        alert('Failed to send image. Check your connection.');
                        console.error(e);
                        return;
                    }
                    cancelImage();
                }

                // Send text if any
                const input = document.getElementById('message-input');
                const content = input.value.trim();
                if (content) {
                    input.value = '';
                    input.style.height = 'auto';
                    try {
                        await fetch('/api/chat/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                senderId: myAccountId,
                                receiverId: selectedTeacherId,
                                content,
                                messageType: 'text',
                                replyToId: replyingTo ? replyingTo.id : null
                            })
                        });
                    } catch (e) { console.error('Failed to send message', e); }
                }

                cancelReply();
                await loadMessages();
            } finally { sendingMessage = false; sendBtn.disabled = false; }
        }

        function toggleAttachPopup() {
            const popup = document.getElementById('attach-popup');
            popup.classList.toggle('hidden');
        }

        function closeAttachPopup() {
            document.getElementById('attach-popup').classList.add('hidden');
        }

        document.addEventListener('click', e => {
            const popup = document.getElementById('attach-popup');
            const btn = document.getElementById('attach-btn');
            if (popup && !popup.classList.contains('hidden') && !popup.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
                closeAttachPopup();
            }
        });

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        async function handleImageSelected(e) {
            const file = e.target.files[0];
            if (!file) return;
            e.target.value = '';

            const btn = document.getElementById('attach-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-xl animate-spin">progress_activity</span>';

            const formData = new FormData();
            formData.append('file', file);
            try {
                const r = await fetch('/api/chat/upload-image', { method: 'POST', body: formData });
                const data = await r.json();
                if (data.url) {
                    pendingImageUrl = data.url;
                    const preview = document.getElementById('image-preview');
                    preview.src = data.url;
                    document.getElementById('image-preview-wrap').classList.remove('hidden');
                } else {
                    alert('Upload failed: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Image upload failed. Check your connection and try again.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined text-xl">add</span>';
            }
        }

        async function handleFileSelected(e) {
            const file = e.target.files[0];
            if (!file) return;
            e.target.value = '';
            if (!selectedTeacherId) return;

            const btn = document.getElementById('attach-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-xl animate-spin">progress_activity</span>';

            const formData = new FormData();
            formData.append('file', file);
            try {
                const r = await fetch('/api/chat/upload-image', { method: 'POST', body: formData });
                const data = await r.json();
                if (data.url) {
                    const content = JSON.stringify({ url: data.url, name: file.name, size: file.size });
                    await fetch('/api/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ senderId: myAccountId, receiverId: selectedTeacherId, content, messageType: 'file', replyToId: replyingTo ? replyingTo.id : null })
                    });
                    cancelReply();
                    await loadMessages();
                } else {
                    alert('Upload failed: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('File upload failed. Check your connection and try again.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined text-xl">add</span>';
            }
        }

        function cancelImage() {
            pendingImageUrl = null;
            document.getElementById('image-preview-wrap').classList.add('hidden');
            document.getElementById('image-preview').src = '';
        }

        function openLightbox(src, allowDownload = true) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const downloadBtn = document.getElementById('lightbox-download-btn');
            img.src = src;
            if (downloadBtn) downloadBtn.classList.toggle('hidden', !allowDownload);
            lb.classList.remove('hidden');
            // Animate in
            requestAnimationFrame(() => {
                img.classList.remove('scale-95', 'opacity-0');
                img.classList.add('scale-100', 'opacity-100');
            });
            document.addEventListener('keydown', closeLightboxOnEsc);
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.classList.remove('scale-100', 'opacity-100');
            img.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                lb.classList.add('hidden');
                img.src = '';
            }, 200);
            document.removeEventListener('keydown', closeLightboxOnEsc);
        }

        function closeLightboxOnEsc(e) {
            if (e.key === 'Escape') closeLightbox();
        }

        async function downloadLightboxImage() {
            const src = document.getElementById('lightbox-img').src;
            if (!src) return;
            const btn = document.getElementById('lightbox-download-btn');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            try {
                const res = await fetch(src);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const ext = src.split('.').pop().split('?')[0] || 'jpg';
                const a = document.createElement('a');
                a.href = url;
                a.download = 'chat_image.' + ext;
                a.click();
                URL.revokeObjectURL(url);
            } catch (_) {
                // fallback: open in new tab so user can long-press save
                window.open(src, '_blank');
            } finally {
                btn.innerHTML = '<span class="material-symbols-outlined">download</span>';
            }
        }

        function startReply(id) {
            const msg = currentMessages.find(x => x.id === id);
            if (!msg) return;
            replyingTo = msg;
            const label = msg.senderId === myAccountId ? 'You' : selectedTeacherName;
            const raw = msg.messageType === 'image' ? '📷 Photo' : msg.messageType === 'file' ? '📎 File' : msg.content;
            document.getElementById('reply-preview-label').textContent = label;
            document.getElementById('reply-preview-text').textContent = raw.length > 80 ? raw.slice(0, 80) + '…' : raw;
            document.getElementById('reply-preview-bar').classList.remove('hidden');
            document.getElementById('message-input').focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('reply-preview-bar').classList.add('hidden');
        }

        function scrollToMessage(id) {
            const el = document.querySelector(`[data-msg-id="${id}"]`);
            if (!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('ring-4', 'ring-[#ffd709]');
            setTimeout(() => el.classList.remove('ring-4', 'ring-[#ffd709]'), 1200);
        }

        function openEditModal(messageId, currentContent) {
            editingMessageId = messageId;
            document.getElementById('edit-input').value = currentContent;
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-input').focus();
        }

        function closeEditModal() {
            editingMessageId = null;
            document.getElementById('edit-modal').classList.add('hidden');
        }

        async function saveEdit() {
            const newContent = document.getElementById('edit-input').value.trim();
            if (!newContent || !editingMessageId) return;
            try {
                await fetch(`/api/chat/messages/${editingMessageId}/edit`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: myAccountId, content: newContent })
                });
                closeEditModal();
                await loadMessages();
            } catch (e) {
                console.error('Failed to edit message', e);
            }
        }

        async function deleteMessage(messageId) {
            if (!confirm('Delete this message?')) return;
            try {
                await fetch(`/api/chat/messages/${messageId}?senderId=${myAccountId}`, { method: 'DELETE' });
                await loadMessages();
            } catch (e) {
                console.error('Failed to delete message', e);
            }
        }

        function formatTime(isoString) {
            const d = new Date(isoString);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(String(text)));
            return d.innerHTML;
        }

        function escapeAttr(text) {
            return String(text).replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // Auto-resize textarea
        document.addEventListener('DOMContentLoaded', () => {
            const ta = document.getElementById('message-input');
            ta.addEventListener('input', () => {
                ta.style.height = 'auto';
                ta.style.height = Math.min(ta.scrollHeight, 128) + 'px';
            });
        });

        // Close edit modal on backdrop click
        document.getElementById('edit-modal')?.addEventListener('click', function (e) {
            if (e.target === this) closeEditModal();
        });
        document.getElementById('add-teacher-modal')?.addEventListener('click', function (e) {
            if (e.target === this) closeAddModal();
        });
    </script>

    <!-- Add Teacher Modal -->
    <div id="add-teacher-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-[#fef9e7] rounded-[2rem] shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
            <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-[#e3ddc5]">
                <h3 class="font-extrabold text-[#312f23] text-lg">Add a Teacher</h3>
                <button onclick="closeAddModal()" class="w-8 h-8 rounded-full hover:bg-[#eee8d3] flex items-center justify-center text-stone-500 transition-colors">
                    <span class="material-symbols-outlined text-base">close</span>
                </button>
            </div>
            <div class="px-4 pt-3 pb-2">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-base">search</span>
                    <input id="add-search-input" placeholder="Search by name or email…" type="text" oninput="filterAddList()"
                        class="w-full pl-10 pr-4 py-2 bg-[#eee8d3] border-none rounded-full text-sm focus:ring-4 focus:ring-[#ffd709]/30 transition-all placeholder:text-stone-400 font-medium text-[#312f23]">
                </div>
            </div>
            <div id="add-teacher-list" class="overflow-y-auto custom-scrollbar px-4 pb-6 space-y-2" style="max-height:340px;">
                <p class="text-center text-stone-400 text-sm py-8">Loading…</p>
            </div>
        </div>
    </div>
</body>

</html>
